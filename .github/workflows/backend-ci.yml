name: backend CI

# Triggers on backend code AND repo-root HTML — both ship together via the
# `shion-quant` Worker (HTML lives at the root for editing, gets synced into
# `backend/public/` at deploy time by `pnpm sync-frontend`).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "*.html"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "*.html"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref so a quick second push doesn't
# pile up redundant CI.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # ─── Deploy ────────────────────────────────────────────────────────────
  # Workers-only deploy. Requires two repo secrets:
  #   CLOUDFLARE_API_TOKEN  — created at https://dash.cloudflare.com/profile/api-tokens
  #                           Use template: "Edit Cloudflare Workers".
  #   CLOUDFLARE_ACCOUNT_ID — dash.cloudflare.com → right sidebar → Account ID.
  deploy:
    name: deploy to cloudflare workers
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm run deploy` runs sync-frontend first (mirrors HTML from repo
      # root → backend/public/), then wrangler deploy. Don't switch to
      # `pnpm exec wrangler deploy` — that would skip the sync step and
      # ship a Worker without any frontend.
      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
